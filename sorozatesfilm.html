<!doctype html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Film / Sorozat hozzáadás</title>
</head>

<body class="bg-dark text-light">

    <header class="text-center h1 py-3 bg-light text-dark shadow-sm">
    🎬 Wishes IMDb
</header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container justify-content-center">

        <div class="navbar-nav gap-3">

            <a href="index.html" class="nav-link text-white px-3">
                Főoldal
            </a>

            <a href="filmek.html" class="nav-link text-white px-3">
                Filmek
            </a>

            <a href="sorozatok.html" class="nav-link text-white px-3">
                Sorozatok
            </a>

            <a href="kedvenceim.html" class="nav-link text-white px-3">
                Kedvenceim
            </a>

            <a href="urlap.html" class="nav-link text-white px-3">
                Filmajánlás
            </a>

            <a href="sorozatesfilm.html" class="nav-link text-white px-3">
                Hozzáadás
            </a>

        </div>

    </div>
</nav>

    <div class="container mt-5">

        <!-- Űrlap -->
        <div class="card bg-warning text-dark shadow p-4">

            <h2 class="text-center mb-4">Új film vagy sorozat hozzáadása</h2>

            <div class="row g-3">

                <!-- Név -->
                <div class="col-md-6">
                    <label class="form-label">Cím</label>
                    <input type="text" id="cim" class="form-control">
                </div>

                <!-- Film vagy sorozat -->
                <div class="col-md-6">
                    <label class="form-label">Típus</label>

                    <select id="tipus" class="form-select">
                        <option value="Film">Film</option>
                        <option value="Sorozat">Sorozat</option>
                    </select>
                </div>

                <!-- Műfaj -->
<div class="col-md-6">
    <label class="form-label">Műfaj</label>

    <select class="form-select" id="mufaj">

        <option value="" hidden>
            -- Válasszon --
        </option>

        <option value="Akció">
            Akciófilm
        </option>

        <option value="Vígjáték">
            Vígjáték
        </option>

        <option value="Dráma">
            Dráma
        </option>

        <option value="Kaland">
            Kalandfilm
        </option>

        <option value="Sci-Fi">
            Sci-fi
        </option>

        <option value="Fantasy">
            Fantasy
        </option>

        <option value="Horror">
            Horror
        </option>

        <option value="Western">
            Western
        </option>

        <option value="Dokumentum">
            Dokumentumfilm
        </option>

        <option value="Bűnügyi">
            Bűnügyi film
        </option>

    </select>
</div>

                <!-- Hossz -->
                <div class="col-md-6">
                    <label class="form-label">Hossz</label>

                    <select id="hossz" class="form-select">
                        <option value="90 perc alatt">90 perc alatt</option>
                        <option value="90 - 120 perc">90 - 120 perc</option>
                        <option value="120+ perc">120+ perc</option>
                    </select>
                </div>

                <!-- Értékelés -->
                <div class="col-md-6">
                    <label class="form-label">Értékelés</label>

                    <select id="csillag" class="form-select">
                        <option value="⭐ 1/5">⭐ 1/5</option>
                        <option value="⭐ 2/5">⭐ 2/5</option>
                        <option value="⭐ 3/5">⭐ 3/5</option>
                        <option value="⭐ 4/5">⭐ 4/5</option>
                        <option value="⭐ 5/5">⭐ 5/5</option>
                    </select>
                </div>

                <!-- Streaming -->
<div class="col-md-6">
    <label class="form-label">Streaming szolgáltatás</label>

    <select id="streaming" class="form-select">
        <option value="Netflix">Netflix</option>
        <option value="Disney+">Disney+</option>
        <option value="HBO Max">HBO Max</option>
        <option value="Prime Video">Prime Video</option>
    </select>
</div>

                <!-- Kép -->
                <div class="col-md-6">
                    <label class="form-label">Kép URL (nem kötelező)</label>

                    <input type="text" id="kep" class="form-control">
                </div>

                <!-- Gomb -->
                <div class="col-12 text-center">
                    <button onclick="hozzaad()" class="btn btn-success">
                        ➕ Hozzáadás
                    </button>
                </div>

            </div>

        </div>

        <!-- Táblázat -->
        <div class="card bg-warning text-dark shadow mt-5 p-4">

            <h2 class="text-center mb-4">Hozzáadott elemek</h2>

            <div class="table-responsive">

                <table class="table table-dark table-striped text-center align-middle">

                    <thead>
                        <tr>
                            <th>Kép</th>
                            <th>Cím</th>
                            <th>Típus</th>
                            <th>Műfaj</th>
                            <th>Hossz</th>
                            <th>Értékelés</th>
<th>Streaming</th>
<th>Törlés</th>
                        </tr>
                    </thead>

                    <tbody id="tabla">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

<script>

    let lista =
        JSON.parse(localStorage.getItem("sajatTartalom")) || [];

    frissitTabla();

    function hozzaad(){

        let uj = {

            cim:
                document.getElementById("cim").value,

            tipus:
                document.getElementById("tipus").value,

            mufaj:
                document.getElementById("mufaj").value,

            hossz:
                document.getElementById("hossz").value,

            csillag:
    document.getElementById("csillag").value,

streaming:
    document.getElementById("streaming").value,

kep:
    document.getElementById("kep").value

        };

        lista.push(uj);

        localStorage.setItem(
            "sajatTartalom",
            JSON.stringify(lista)
        );

        frissitTabla();

    }

    function torol(index){

        lista.splice(index, 1);

        localStorage.setItem(
            "sajatTartalom",
            JSON.stringify(lista)
        );

        frissitTabla();

    }

    function frissitTabla(){

        let tabla =
            document.getElementById("tabla");

        tabla.innerHTML = "";

        lista.forEach((elem, index) => {

            tabla.innerHTML += `

            <tr>

                <td>

                    ${
                        elem.kep
                        ?
                        `<img src="${elem.kep}" width="80">`
                        :
                        "Nincs kép"
                    }

                </td>

                <td>${elem.cim}</td>

                <td>${elem.tipus}</td>

                <td>${elem.mufaj}</td>

                <td>${elem.hossz}</td>

                <td>${elem.csillag}</td>

<td>${elem.streaming}</td>

<td>

                    <button
                        onclick="torol(${index})"
                        class="btn btn-danger">

                        ❌

                    </button>

                </td>

            </tr>

            `;

        });

    }

</script>

</body>
</html>
