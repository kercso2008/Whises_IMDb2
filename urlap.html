    <!-- Műfaj választó -->
     <div class="container">
      <div class="row d-flex align-items-center justify-content-center">
    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5 rounded shadow">Filmajánlás</header>

      </div>
     </div>

    <div class="container mt-4">

  <div class="card shadow p-4 bg-warning mx-auto" style="max-width: 600px;">

    <h2 class="text-center mb-4">Mi legyen a film műfaja?</h2>

    <select class="form-select mb-4" id="filmtipus">
      <option value="" hidden>--Válaszon--</option>
      <option value="Akció">Akciófilm</option>
      <option value="Vígjáték">Vígjáték</option>
      <option value="Dráma">Dráma</option>
      <option value="Kaland">Kalandfilm</option>
      <option value="Sci-Fi">Sci-fi</option>
      <option value="Fantasy">Fantasy</option>
      <option value="Horror">Horror</option>
      <option value="Western">Western</option>
      <option value="Dokumentum">Dokumentumfilm</option>
      <option value="Bűnügyi">Bűnügyi film</option>
    </select>

    <h4 class="mb-2">Milyen hosszú legyen a film?</h4>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="hossz" value="90kisebb" id="r1">
      <label class="form-check-label" for="r1">90 percnél kevesebb</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="hossz" value="90-120" id="r2">
      <label class="form-check-label" for="r2">90-120 perc</label>
    </div>

    <div class="form-check mb-4">
      <input class="form-check-input" type="radio" name="hossz" value="120tobb" id="r3">
      <label class="form-check-label" for="r3">120 percnél több</label>
    </div>

    <h4 class="mb-2">Hol szeretnéd nézni?</h4>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="netflix">
      <label class="form-check-label" for="netflix">Netflix</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="disney">
      <label class="form-check-label" for="disney">Disney+</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="hbo">
      <label class="form-check-label" for="hbo">HBO Max</label>
    </div>

    <div class="form-check mb-4">
      <input class="form-check-input" type="checkbox" id="primevideo">
      <label class="form-check-label" for="primevideo">Prime Video</label>
    </div>

    <button class="btn btn-dark w-100" onclick="kereses()">
      Keresés
    </button>

  </div>

  <div class="container mt-4 d-flex justify-content-center">

  <div class="card shadow p-3 w-75 bg-warning p-4 rounded shadow" id="eredmeny" style="display: none;">
  </div>

</div>

</div>
  </body>

  <script>
    const filmek = [
  {

    kep: "képek/film/A viszkis (Bűnügyi).jpg"
  },

    kep: "képek/film/Ace Ventura (Vígjáték).jpg"
  },
  {

    mufaj: "Sci-Fi",
    hossz: "90-120",
    streaming: "Disney+",
    ertekeles: 5,
    kep: "képek/film/Alien (SciFi).jpg"
  },
  {

  },

  {

    mufaj: "Akció",

    streaming: "Mozi",

  },
  {

    streaming: "Netflix",
    ertekeles: 4,
    kep: "képek/film/Jumanji (Kaland).jpg"
  },
  {
    cim: "Michael",

    ertekeles: 4,
    kep: "képek/film/Michael (Dráma).jpg"
  },
  {
    cim: "Rémálom az Elm utcában",
    mufaj: "Horror",
    hossz: "90-120",
    streaming: "HBO Max",
    ertekeles: 4,
    kep: "képek/film/Rémálom az Elm utcában (Horror).jpg"
  },
  {
    cim: "Schumacher",
    mufaj: "Dokumentum",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
    kep: "képek/film/Schumacher (Dokumentum).jpg"
  },
  {

  },
  {

  },
  {

  },
  {
    cim: "Star Trek",

  {

  {

  },
  {

    ertekeles: 5,

  },
  {
    cim: "Zöld Íjász",
    mufaj: "Akció",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 4,
    kep: "képek/Sorozat/Zöldíjász (akció).jpg"
  }
];
    let sajatTartalom =
    JSON.parse(localStorage.getItem("sajatTartalom")) || [];
    function kereses() {
      const mufaj = document.getElementById("filmtipus").value;
      const hossz = document.querySelector(
        'input[name="hossz"]:checked',
      )?.value;
      let streamingek = [];
      if (document.getElementById("netflix").checked) {
        streamingek.push("Netflix");
      }
      if (document.getElementById("disney").checked) {
        streamingek.push("Disney+");
      }
      if (document.getElementById("hbo").checked) {
        streamingek.push("HBO Max");
      }
      if (document.getElementById("primevideo").checked) {
        streamingek.push("Prime Video");
      }
      //A filmek.filter() egy JavaScript függvény, ami kiszűri azokat az elemeket egy tömbből, amelyek megfelelnek egy feltételnek.
      const talalatok = filmek.filter(
        (film) =>
          (!mufaj || film.mufaj == mufaj) &&
          (!hossz || film.hossz == hossz) &&
          (streamingek.length == 0 || streamingek.includes(film.streaming))
      );
      const eredmeny = document.getElementById("eredmeny");
      eredmeny.innerHTML = "";
      if (talalatok.length > 0) {
        eredmeny.innerHTML = "<h2>Találatok:</h2>";
        talalatok.forEach((film) => {
          eredmeny.innerHTML += `
<div class="card mb-3 shadow-sm">

    <div class="row g-0">

        <!-- KÉP -->
        <div class="col-md-4">
            <img
                src="${film.kep || 'képek/letöltés.png'}"
                class="img-fluid rounded-start"
                alt="${film.cim}"
                style="height: 100%; object-fit: cover;"
            >
        </div>

        <!-- TARTALOM -->
        <div class="col-md-8">

            <div class="card-body">

                <h3 class="card-title">${film.cim}</h3>

                <p class="card-text mb-1">
                    <strong>Műfaj:</strong> ${film.mufaj}
                </p>

                <p class="card-text mb-1">
                    <strong>Streaming:</strong> ${film.streaming}
                </p>

                <p class="card-text">
                    <strong>Értékelés:</strong> ${film.ertekeles}/5
                </p>

            </div>

        </div>

    </div>

</div>
                `
                eredmeny.style.display = "block";;
        });
      } else {
        eredmeny.innerHTML = `
                <h2>Nincs találat.</h2>
            `;
      }
    }
    
    sajatTartalom.forEach(elem => {

    let hosszKategoria = "";

    if(elem.hossz == "90 perc alatt"){
        hosszKategoria = "90kisebb";
    }
    else if(elem.hossz == "90 - 120 perc"){
        hosszKategoria = "90-120";
    }
    else{
        hosszKategoria = "120tobb";
    }

    filmek.push({

        cim: elem.cim,

        mufaj: elem.mufaj,

        hossz: hosszKategoria,

        streaming: elem.streaming,

        kep: elem.kep,

        ertekeles:
            parseInt(elem.csillag.replace("⭐ ", "").replace("/5", ""))

    });

});
  </script>
