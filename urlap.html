<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Wishes IMDb - Filmajánlás</title>
  </head>
  <body class="bg-dark text-light">

    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">Wishes IMDb</header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary justify-content-center">
      <a href="index.html" class="ms-5 text-white">Főoldal</a>
      <a href="filmek.html" class="ms-5 text-white">Filmek</a>
      <a href="sorozatok.html" class="ms-5 text-white">Sorozatok</a>
      <a href="kedvenceim.html" class="ms-5 text-white">Kedvenceim</a>
      <a href="urlap.html" class="ms-5 text-white">Filmajánlás</a>
    </nav>

    <!-- Műfaj választó -->
    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">Filmajánlás</header>

    <h2>Mi legyen a film műfaja?</h2>
    <select name="tipus" id="filmtipus">
      <option value="" hidden>--Válaszon--</option>
      <option value="akcio">Akciófilm</option>
      <option value="vigjatek">Vígjáték</option>
      <option value="drama">Dráma</option>
      <option value="kaland">Kalandfilm</option>
      <option value="scifi">Sci-fi</option>
      <option value="fantasy">Fantasy</option>
      <option value="horror">Horror</option>
      <option value="western">Western</option>
      <option value="dokumentum">Dokumentumfilm</option>
      <option value="bunugyi">Bűnügyi film</option>
    </select>

    <!--Film hossz -->
    <h2>Milyen hosszú legyen a film?</h2>
    <input type="radio" name="hossz" value="90kisebb" />
    <label for="90kisebb">90 percnél kevesebb</label><br>
    <input type="radio" name="hossz" value="90-120" />
    <label for="90-120">90-120 perc</label><br>
    <input type="radio" name="hossz" value="120tobb" />
    <label for="120tobb">120 percnél több</label><br>

    <!-- Streaming szolgáltató -->
    <h2>Hol szeretnéd nézni?</h2>
    <input type="checkbox" name="streaming" id="netflix" />
    <label for="netflix">Netflix</label><br>
    <input type="checkbox" name="streaming" id="disney" />
    <label for="disney">Disney+</label><br>
    <input type="checkbox" name="streaming" id="hbo" />
    <label for="hbo">HBO Max</label><br>
    <input type="checkbox" name="streaming" id="primevideo" />
    <label for="primevideo">Prime Video</label><br>

    <!-- Értékelési szint -->
    <br /><label for="ertekeles">Értékelés</label><br />
    <input
      type="range"
      name="ertekeles"
      id="ertekeles"
      min="1"
      max="5"
      value="1"
    />
    <br>

    <button onclick="kereses()">Keresés</button>
    <div id="eredmeny"></div>
  </body>

  <script>
    const filmek = [
      {
    cim: "A Viszkis",
    mufaj: "Bűnügyi",
    hossz: "120tobb",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Ace Ventura: Állati nyomozó",
    mufaj: "Vígjáték",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 3,
  },
  {
    cim: "Alien",
    mufaj: "Sci-Fi",
    hossz: "90-120",
    streaming: "Disney+",
    ertekeles: 5,
  },
  {
    cim: "Avatar",
    mufaj: "Fantasy",
    hossz: "120tobb",
    streaming: "Disney+",
    ertekeles: 4,
  },
  {
    cim: "Az ördög jobb és bal keze",
    mufaj: "Western",
    hossz: "90-120",
    streaming: "Prime Video",
    ertekeles: 4,
  },
  {
    cim: "F1 The Movie",
    mufaj: "Akció",
    hossz: "120tobb",
    streaming: "Mozi",
    ertekeles: 0,
  },
  {
    cim: "Jumanji",
    mufaj: "Kaland",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Michael",
    mufaj: "Dráma",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Rémálom az Elm utcában",
    mufaj: "Horror",
    hossz: "90-120",
    streaming: "HBO Max",
    ertekeles: 4,
  },
  {
    cim: "Schumacher",
    mufaj: "Dokumentum",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Columbo",
    mufaj: "Bűnügyi",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 4,
  },
  {
    cim: "Dr. House",
    mufaj: "Dráma",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 5,
  },
  {
    cim: "Formula 1: Drive to Survive",
    mufaj: "Dokumentum",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 5,
  },
  {
    cim: "Family Guy",
    mufaj: "Vígjáték",
    hossz: "90kisebb",
    streaming: "Disney+",
    ertekeles: 4,
  },
  {
    cim: "Spartacus",
    mufaj: "Kaland",
    hossz: "90kisebb",
    streaming: "Starz",
    ertekeles: 5,
  },
  {
    cim: "Star Trek",
    mufaj: "Sci-Fi",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 4,
  },
  {
    cim: "The Last of Us",
    mufaj: "Horror",
    hossz: "90kisebb",
    streaming: "HBO Max",
    ertekeles: 5,
  },
  {
    cim: "Trónok harca",
    mufaj: "Fantasy",
    hossz: "90kisebb",
    streaming: "HBO Max",
    ertekeles: 5,
  },
  {
    cim: "Yellowstone",
    mufaj: "Western",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 5,
  },
  {
    cim: "Zöld Íjász",
    mufaj: "Akció",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 4,
  },
    ];
    function kereses() {
      const mufaj = document.getElementById("filmtipus").value;
      const hossz = document.querySelector(
        'input[name="hossz"]:checked',
      )?.value;
      const ertekeles = document.getElementById("ertekeles").value;
      let streamingek = [];
      if (document.getElementById("netflix").checked) {
        streamingek.push("Netflix");
      }
      if (document.getElementById("disney").checked) {
        streamingek.push("Disney+");
      }
      if (document.getElementById("hbo").checked) {
        streamingek.push("HBO Max");
      }
      if (document.getElementById("primevideo").checked) {
        streamingek.push("Prime Video");
      }
      //A filmek.filter() egy JavaScript függvény, ami kiszűri azokat az elemeket egy tömbből, amelyek megfelelnek egy feltételnek.
      const talalatok = filmek.filter(
        (film) =>
          (!mufaj || film.mufaj == mufaj) &&
          (!hossz || film.hossz == hossz) &&
          (streamingek.length == 0 || streamingek.includes(film.streaming)) &&
          film.ertekeles >= ertekeles,
      );
      const eredmeny = document.getElementById("eredmeny");
      eredmeny.innerHTML = "";
      if (talalatok.length > 0) {
        eredmeny.innerHTML = "<h2>Találatok:</h2>";
        talalatok.forEach((film) => {
          eredmeny.innerHTML += `
                    <div style="
                        border:1px solid gray;
                        padding:15px;
                        margin:15px;
                        border-radius:10px;
                    ">
                        <h3>${film.cim}</h3>
                        <p>
                            <b>Műfaj:</b> ${film.mufaj}
                        </p>
                        <p>
                            <b>Streaming:</b> ${film.streaming}
                        </p>
                        <p>
                            <b>Értékelés:</b> ${film.ertekeles}/5
                        </p>
                    </div>
                `;
        });
      } else {
        eredmeny.innerHTML = `
                <h2>Nincs találat.</h2>
            `;
      }
    }
  </script>
</html>
