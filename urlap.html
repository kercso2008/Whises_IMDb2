<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Wishes IMDb - Filmajánlás</title>
  </head>
  <body class="bg-dark text-light">

    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">Wishes IMDb</header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary justify-content-center">
      <a href="index.html" class="ms-5 text-white">Főoldal</a>
      <a href="filmek.html" class="ms-5 text-white">Filmek</a>
      <a href="sorozatok.html" class="ms-5 text-white">Sorozatok</a>
      <a href="kedvenceim.html" class="ms-5 text-white">Kedvenceim</a>
      <a href="urlap.html" class="ms-5 text-white">Filmajánlás</a>
    </nav>

    <!-- Műfaj választó -->
    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">Filmajánlás</header>

    <div class="container mt-4">

  <div class="card shadow p-4 bg-warning mx-auto" style="max-width: 600px;">

    <h2 class="text-center mb-4">Mi legyen a film műfaja?</h2>

    <select class="form-select mb-4" id="filmtipus">
      <option value="" hidden>--Válaszon--</option>
      <option value="Akció">Akciófilm</option>
      <option value="Vígjáték">Vígjáték</option>
      <option value="Dráma">Dráma</option>
      <option value="Kaland">Kalandfilm</option>
      <option value="Sci-Fi">Sci-fi</option>
      <option value="Fantasy">Fantasy</option>
      <option value="Horror">Horror</option>
      <option value="Western">Western</option>
      <option value="Dokumentum">Dokumentumfilm</option>
      <option value="Bűnügyi">Bűnügyi film</option>
    </select>

    <h4 class="mb-2">Milyen hosszú legyen a film?</h4>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="hossz" value="90kisebb" id="r1">
      <label class="form-check-label" for="r1">90 percnél kevesebb</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="radio" name="hossz" value="90-120" id="r2">
      <label class="form-check-label" for="r2">90-120 perc</label>
    </div>

    <div class="form-check mb-4">
      <input class="form-check-input" type="radio" name="hossz" value="120tobb" id="r3">
      <label class="form-check-label" for="r3">120 percnél több</label>
    </div>

    <h4 class="mb-2">Hol szeretnéd nézni?</h4>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="netflix">
      <label class="form-check-label" for="netflix">Netflix</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="disney">
      <label class="form-check-label" for="disney">Disney+</label>
    </div>

    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="hbo">
      <label class="form-check-label" for="hbo">HBO Max</label>
    </div>

    <div class="form-check mb-4">
      <input class="form-check-input" type="checkbox" id="primevideo">
      <label class="form-check-label" for="primevideo">Prime Video</label>
    </div>

    <button class="btn btn-dark w-100" onclick="kereses()">
      Keresés
    </button>

  </div>

  <div class="container mt-4 d-flex justify-content-center">

  <div class="card shadow p-3 w-75 bg-warning p-4 rounded shadow" id="eredmeny">
  </div>

</div>

</div>
  </body>

  <script>
    const filmek = [
      {
    cim: "A Viszkis",
    mufaj: "Bűnügyi",
    hossz: "120tobb",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Ace Ventura: Állati nyomozó",
    mufaj: "Vígjáték",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 3,
  },
  {
    cim: "Alien",
    mufaj: "Sci-Fi",
    hossz: "90-120",
    streaming: "Disney+",
    ertekeles: 5,
  },
  {
    cim: "Avatar",
    mufaj: "Fantasy",
    hossz: "120tobb",
    streaming: "Disney+",
    ertekeles: 4,
  },
  {
    cim: "Az ördög jobb és bal keze",
    mufaj: "Western",
    hossz: "90-120",
    streaming: "Prime Video",
    ertekeles: 4,
  },
  {
    cim: "F1 The Movie",
    mufaj: "Akció",
    hossz: "120tobb",
    streaming: "Mozi",
    ertekeles: 0,
  },
  {
    cim: "Jumanji",
    mufaj: "Kaland",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Michael",
    mufaj: "Dráma",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Rémálom az Elm utcában",
    mufaj: "Horror",
    hossz: "90-120",
    streaming: "HBO Max",
    ertekeles: 4,
  },
  {
    cim: "Schumacher",
    mufaj: "Dokumentum",
    hossz: "90-120",
    streaming: "Netflix",
    ertekeles: 4,
  },
  {
    cim: "Columbo",
    mufaj: "Bűnügyi",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 4,
  },
  {
    cim: "Dr. House",
    mufaj: "Dráma",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 5,
  },
  {
    cim: "Formula 1: Drive to Survive",
    mufaj: "Dokumentum",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 5,
  },
  {
    cim: "Family Guy",
    mufaj: "Vígjáték",
    hossz: "90kisebb",
    streaming: "Disney+",
    ertekeles: 4,
  },
  {
    cim: "Spartacus",
    mufaj: "Kaland",
    hossz: "90kisebb",
    streaming: "Starz",
    ertekeles: 5,
  },
  {
    cim: "Star Trek",
    mufaj: "Sci-Fi",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 4,
  },
  {
    cim: "The Last of Us",
    mufaj: "Horror",
    hossz: "90kisebb",
    streaming: "HBO Max",
    ertekeles: 5,
  },
  {
    cim: "Trónok harca",
    mufaj: "Fantasy",
    hossz: "90kisebb",
    streaming: "HBO Max",
    ertekeles: 5,
  },
  {
    cim: "Yellowstone",
    mufaj: "Western",
    hossz: "90kisebb",
    streaming: "SkyShowtime",
    ertekeles: 5,
  },
  {
    cim: "Zöld Íjász",
    mufaj: "Akció",
    hossz: "90kisebb",
    streaming: "Netflix",
    ertekeles: 4,
  },
    ];
    function kereses() {
      const mufaj = document.getElementById("filmtipus").value;
      const hossz = document.querySelector(
        'input[name="hossz"]:checked',
      )?.value;
      let streamingek = [];
      if (document.getElementById("netflix").checked) {
        streamingek.push("Netflix");
      }
      if (document.getElementById("disney").checked) {
        streamingek.push("Disney+");
      }
      if (document.getElementById("hbo").checked) {
        streamingek.push("HBO Max");
      }
      if (document.getElementById("primevideo").checked) {
        streamingek.push("Prime Video");
      }
      //A filmek.filter() egy JavaScript függvény, ami kiszűri azokat az elemeket egy tömbből, amelyek megfelelnek egy feltételnek.
      const talalatok = filmek.filter(
        (film) =>
          (!mufaj || film.mufaj == mufaj) &&
          (!hossz || film.hossz == hossz) &&
          (streamingek.length == 0 || streamingek.includes(film.streaming))
      );
      const eredmeny = document.getElementById("eredmeny");
      eredmeny.innerHTML = "";
      if (talalatok.length > 0) {
        eredmeny.innerHTML = "<h2>Találatok:</h2>";
        talalatok.forEach((film) => {
          eredmeny.innerHTML += `
<div class="card shadow-sm mb-3 p-3">

    <h3 class="mb-3">${film.cim}</h3>

    <p class="mb-1">
        <strong>Műfaj:</strong> ${film.mufaj}
    </p>

    <p class="mb-1">
        <strong>Streaming:</strong> ${film.streaming}
    </p>

    <p class="mb-0">
        <strong>Értékelés:</strong> ${film.ertekeles}/5
    </p>

</div>
                `;
        });
      } else {
        eredmeny.innerHTML = `
                <h2>Nincs találat.</h2>
            `;
      }
    }
  </script>
</html>
