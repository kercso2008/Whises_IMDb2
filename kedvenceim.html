<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Wishes IMDb - Kedvenceim</title>
  </head>
  <body class="bg-dark text-light">
    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">Wishes IMDb</header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary justify-content-center">
      <a href="index.html" class="ms-5 text-white">Főoldal</a>
      <a href="filmek.html" class="ms-5 text-white">Filmek</a>
      <a href="sorozatok.html" class="ms-5 text-white">Sorozatok</a>
      <a href="kedvenceim.html" class="ms-5 text-white">Kedvenceim</a>
      <a href="urlap.html" class="ms-5 text-white">Filmajánlás</a>
    </nav>
       
    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">Kedvenceim</header>

    <h1>Profil</h1>
    <h3>Név</h3>
    <input type="text" name="" id="" placeholder="" /><br />

    <h3>Profilkép:</h3>
    <input type="file" name="" id="" accept="" /><br />

    <button id="torles" onclick="osszesTorles()">Összes kedvenc törlése</button>

    <!-- Itt a "kedvenc" lista helye -->
    <div id="kedvencek-lista"></div>

    <script>

        let kedvencek =
            JSON.parse(localStorage.getItem("kedvencek")) || [];

        let lista =
            document.getElementById("kedvencek-lista");

        if(kedvencek.length === 0){

            lista.innerHTML = "<h2>Nincsenek kedvencek.</h2>";

        }
        else{

            kedvencek.forEach(item => {

                let div = document.createElement("div");

                div.innerHTML = `

                    <h2>${item.cim}</h2>

                    <img src="${item.kep}"
                    alt="${item.cim}"
                    width="250">

                    <p>Műfaj: ${item.mufaj}</p>

                    <p>Típus: ${item.tipus}</p>

                    <button onclick="torles('${item.cim}')">
                        Törlés
                    </button>

                    <hr>

                `;

                lista.appendChild(div);

            });

        }

        function torles(cim){

            kedvencek =
                kedvencek.filter(f => f.cim !== cim);

            localStorage.setItem(
                "kedvencek",
                JSON.stringify(kedvencek)
            );

            location.reload();

        }

        function osszesTorles(){

            localStorage.removeItem("kedvencek");

            location.reload();

        }

    </script>

  </body>
</html>
