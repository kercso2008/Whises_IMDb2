<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Wishes IMDb - Kedvenceim</title>
  </head>
  <body class="bg-dark text-light">
    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">
      Wishes IMDb
    </header>
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-secondary justify-content-center"
    >
      <a href="index.html" class="ms-5 text-white">Főoldal</a>
      <a href="filmek.html" class="ms-5 text-white">Filmek</a>
      <a href="sorozatok.html" class="ms-5 text-white">Sorozatok</a>
      <a href="kedvenceim.html" class="ms-5 text-white">Kedvenceim</a>
      <a href="urlap.html" class="ms-5 text-white">Filmajánlás</a>
    </nav>

    <header class="text-center h2 p-3 container-fluid bg-light text-dark mt-5">
      Kedvenceim
    </header>

    <div class="container mt-5">
      <div class="row g-4">
        <!-- PROFIL BAL OLDAL -->
        <div class="col-lg-4">
          <div class="card shadow-lg p-4 bg-warning">
            <h1 class="text-center mb-4">Profil</h1>

            <div class="mb-3">
              <label class="form-label">Név</label>
              <input
                type="text"
                id="nev"
                class="form-control"
                placeholder="Írd be a neved"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Profilkép</label>
              <input
                type="file"
                id="profilkepInput"
                class="form-control"
                accept="image/*"
              />
            </div>

            <div class="text-center mb-3">
              <img
                id="profilkep"
                class="img-fluid rounded-circle border"
                style="
                  width: 180px;
                  height: 180px;
                  object-fit: cover;
                  display: none;
                "
              />
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-success" onclick="mentes()">Mentés</button>

              <button class="btn btn-danger" onclick="torlesProfil()">
                Profil törlése
              </button>

              <button class="btn btn-danger" onclick="osszesTorles()">
                Összes kedvenc törlése
              </button>
            </div>
          </div>
        </div>

        <!-- KEDVENCEK JOBB OLDAL -->
        <div class="col-lg-8">
          <div
            id="kedvencek-lista"
            class="row g-4 bg-warning p-4 rounded shadow"
          ></div>
        </div>
      </div>
    </div>

    <script>
      let kedvencek = JSON.parse(localStorage.getItem("kedvencek")) || [];

      let lista = document.getElementById("kedvencek-lista");

      if (kedvencek.length === 0) {
        lista.innerHTML = "<h2>Nincsenek kedvencek.</h2>";
      } else {
        kedvencek.forEach((item) => {
          let col = document.createElement("div");
          col.className = "col-md-4 d-flex justify-content-center";

          col.innerHTML = `

        <div class="card shadow" style="width: 18rem;">

            <img 
                src="${item.kep}" 
                class="card-img-top"
                alt="${item.cim}"
            >

            <div class="card-body d-flex flex-column">

                <h5 class="card-title text-center">
                    ${item.cim}
                </h5>

                <p><strong>Műfaj:</strong> ${item.mufaj}</p>

                <p><strong>Típus:</strong> ${item.tipus}</p>

                <button 
                    class="btn btn-danger mt-auto"
                    onclick="torles('${item.cim}')"
                >
                    Törlés
                </button>

            </div>

        </div>

    </div>
                `;

          lista.appendChild(col);
        });
      }

      function torles(cim) {
        kedvencek = kedvencek.filter((f) => f.cim !== cim);

        localStorage.setItem("kedvencek", JSON.stringify(kedvencek));

        location.reload();
      }

      function osszesTorles() {
        localStorage.removeItem("kedvencek");

        location.reload();
      }

      const nevInput = document.getElementById("nev");
      const profilkepInput = document.getElementById("profilkepInput");
      const profilkep = document.getElementById("profilkep");

      // Betöltés
      window.onload = function () {
        const mentettNev = localStorage.getItem("profilNev");
        const mentettKep = localStorage.getItem("profilKep");

        if (mentettNev) {
          nevInput.value = mentettNev;
        }

        if (mentettKep) {
          profilkep.src = mentettKep;
          profilkep.style.display = "block";
        }
      };

      // Kép előnézet
      profilkepInput.addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
          const reader = new FileReader();

          reader.onload = function (e) {
            profilkep.src = e.target.result;
            profilkep.style.display = "block";
          };

          reader.readAsDataURL(file);
        }
      });

      // Mentés
      function mentes() {
        localStorage.setItem("profilNev", nevInput.value);
        localStorage.setItem("profilKep", profilkep.src);

        alert("Profil elmentve!");
      }

      // Profil törlése
      function torlesProfil() {
        localStorage.removeItem("profilNev");
        localStorage.removeItem("profilKep");

        nevInput.value = "";
        profilkep.src = "";
        profilkep.style.display = "none";

        alert("Profil törölve!");
      }
    </script>
  </body>
</html>
